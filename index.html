<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaizen Supreme - Professional Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05060f;
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-overlay: rgba(255, 255, 255, 0.05);
            --accent-glow: rgba(99, 102, 241, 0.5);
            --primary: #6366f1;
            --primary-glow: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Abstract Premium Background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem 0;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stepper UI */
        .stepper {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--card-overlay);
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: var(--primary);
            box-shadow: 0 0 10px var(--accent-glow);
            transform: scale(1.5);
        }

        /* Glass Cards */
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }

        .glass-card.hidden {
            display: none;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        textarea,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Button Supreme */
        .btn-supreme {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-supreme:active {
            transform: scale(0.98);
        }

        .btn-supreme:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            margin-top: 1rem;
        }

        /* Output View */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
        }

        .score-display {
            text-align: right;
        }

        .score-large {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            color: var(--primary-glow);
        }

        .report-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.8;
            white-space: pre-wrap;
            border-left: 2px solid var(--primary);
            margin-bottom: 2rem;
        }

        .audit-item {
            display: flex;
            gap: 12px;
            padding: 1rem;
            background: rgba(245, 158, 11, 0.05);
            border-radius: 14px;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
        }

        .audit-cat {
            font-weight: 800;
            color: var(--warning);
            min-width: 60px;
        }

        /* iPhone 7 Specific Fixes */
        @media (max-width: 375px) {
            .container {
                padding: 1rem;
            }

            .glass-card {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>

    <div class="container">
        <header>
            <h1>Kaizen Supreme</h1>
            <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 4px;">Elite Performance Report</p>
        </header>

        <div class="stepper" id="stepper">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <main>
            <!-- STEP 1: Framing -->
            <div class="glass-card fade-in" id="step-1">
                <p style="margin-bottom: 1.5rem; font-weight: 700;">Step 1: 戦略的タイトルの作成</p>
                <div class="field-group">
                    <label>対策 (何をしたか)</label>
                    <input type="text" id="measure" placeholder="例：シリコンフラップの設置" required>
                </div>
                <div class="field-group">
                    <label>変化対象 (何が変わるか)</label>
                    <input type="text" id="target" placeholder="例：テープの張り付き位置" required>
                </div>
                <div class="field-group">
                    <label>結果 (どうなったか)</label>
                    <input type="text" id="result" placeholder="例：適正化" required>
                </div>
                <div class="field-group">
                    <label>開始週 (WK)</label>
                    <input type="number" id="wk" value="10">
                </div>
                <button class="btn-supreme" onclick="nextStep(2)">次へ進む</button>
            </div>

            <!-- STEP 2: Analysis -->
            <div class="glass-card hidden fade-in" id="step-2">
                <p style="margin-bottom: 1.5rem; font-weight: 700;">Step 2: 現状と対策の深掘り</p>
                <div class="field-group">
                    <label>現状（問題の描写）</label>
                    <textarea id="prob" rows="4" placeholder="誰が見ても困っている状況が伝わるように..." required></textarea>
                </div>
                <div class="field-group">
                    <label>実施内容（具体的な5W1H）</label>
                    <textarea id="sol" rows="4" placeholder="いつ、どこに、何を、どう設置したか..." required></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-supreme btn-secondary" onclick="nextStep(1)">戻る</button>
                    <button class="btn-supreme" onclick="nextStep(3)">次へ進む</button>
                </div>
            </div>

            <!-- STEP 3: Data -->
            <div class="glass-card hidden fade-in" id="step-3">
                <p style="margin-bottom: 1.5rem; font-weight: 700;">Step 3: 財務データとROI</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="field-group">
                        <label>改善前 (秒/分)</label>
                        <input type="number" id="b-val" value="10" step="0.1">
                    </div>
                    <div class="field-group">
                        <label>改善後 (秒/分)</label>
                        <input type="number" id="a-val" value="2" step="0.1">
                    </div>
                </div>
                <div class="field-group">
                    <label>時間単位</label>
                    <select id="unit-type">
                        <option value="sec">秒 (Seconds)</option>
                        <option value="min">分 (Minutes)</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="field-group">
                        <label>頻度 (回/日)</label>
                        <input type="number" id="f-val" value="500">
                    </div>
                    <div class="field-group">
                        <label>費用 (円)</label>
                        <input type="number" id="cost" value="0">
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-supreme btn-secondary" onclick="nextStep(2)">戻る</button>
                    <button class="btn-supreme" style="background: var(--success);" id="finish-btn"
                        onclick="finish()">完成させる</button>
                </div>
            </div>

            <!-- OUTPUT -->
            <div id="output-view" class="hidden fade-in">
                <div class="report-header">
                    <div>
                        <p style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;">Final Report
                        </p>
                        <h2 style="font-size: 1.2rem;">Generated Draft</h2>
                    </div>
                    <div class="score-display">
                        <p style="font-size: 0.6rem; color: var(--text-dim);">DIVE DEEP SCORE</p>
                        <div class="score-large" id="l-score">--</div>
                    </div>
                </div>

                <div id="rep-out" class="report-box"></div>

                <div id="audit-sec" style="margin-bottom: 2rem;">
                    <p
                        style="font-size: 0.7rem; font-weight: 800; color: var(--text-dim); margin-bottom: 1rem; text-transform: uppercase;">
                        Detailed Audit Insights</p>
                    <div id="audit-list"></div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button class="btn-supreme btn-secondary" style="flex: 1;" onclick="restart()">最初から</button>
                    <button class="btn-supreme" style="flex: 2;" onclick="copyReport()">レポートをコピー</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let currentStep = 1;
        const totalSteps = 3;

        function nextStep(s) {
            document.querySelectorAll('.glass-card').forEach(c => c.classList.add('hidden'));
            document.getElementById(`step-${s}`).classList.remove('hidden');

            const dots = document.querySelectorAll('.step-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < s));
            currentStep = s;
            window.scrollTo(0, 0);
        }

        function restart() {
            document.getElementById('output-view').classList.add('hidden');
            document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('active'));
            document.getElementById('stepper').classList.remove('hidden');
            nextStep(1);
        }

        function finish() {
            const d = {
                measure: document.getElementById('measure').value,
                target: document.getElementById('target').value,
                result: document.getElementById('result').value,
                prob: document.getElementById('prob').value,
                sol: document.getElementById('sol').value,
                b: parseFloat(document.getElementById('b-val').value),
                a: parseFloat(document.getElementById('a-val').value),
                f: parseInt(document.getElementById('f-val').value),
                cost: parseFloat(document.getElementById('cost').value),
                unit: document.getElementById('unit-type').value,
                wk: parseInt(document.getElementById('wk').value),
                rate: 1500
            };

            const res = generateReport(d);

            document.getElementById('rep-out').textContent = res.txt;
            document.getElementById('l-score').textContent = res.s;
            document.getElementById('audit-list').innerHTML = res.audit.map(a => `
                <div class="audit-item">
                    <div class="audit-cat">${a.cat}</div>
                    <div>
                        <span style="font-weight: 800; color: ${a.p < 0 ? 'var(--error)' : 'var(--success)'};">${a.p > 0 ? '+' : ''}${a.p}pts</span>
                        <p style="margin-top:2px; opacity: 0.8;">${a.msg}</p>
                    </div>
                </div>
            `).join('') || '<p style="font-size:0.8rem; opacity:0.5;">✅ すべての監査基準を満たしています。</p>';

            document.getElementById('stepper').classList.add('hidden');
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('output-view').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function generateReport(d) {
            const audit = [];
            let s = 95;

            // ROI Logic (Official FC 4-Step)
            const diff = d.b - d.a;
            const diffUnit = d.unit === 'sec' ? '秒' : '分';
            const hoursPerTime = d.unit === 'sec' ? diff / 3600 : diff / 60;
            const yenPerTime = hoursPerTime * d.rate;
            const yenPerYear = Math.round(yenPerTime * d.f * 365);

            // Audit Logic (Ron-logic)
            const subK = ['視認', '見える', '表示', 'カラー', 'ライト', '目印'];
            const solK = ['剥がす', 'くっつく', 'フラップ', '返し', '物理', '清掃'];
            const hasSubV = subK.some(k => d.measure.includes(k) || d.target.includes(k));
            const hasSolP = solK.some(k => d.sol.includes(k));

            if (hasSubV && hasSolP) {
                audit.push({ cat: "整合性", p: -40, msg: "タイトルは『視覚的』ですが、解決策は『物理的』です。この不一致はディレクターに指摘されます。" });
                s -= 40;
            }
            if (d.sol.match(/交換|導入/) && d.cost <= 0) {
                audit.push({ cat: "財務", p: -10, msg: "交換・導入には通常コストがかかります。0円の根拠が必要です。" });
                s -= 10;
            }

            const clean = (str) => str.trim().replace(/。+$/, '');
            const txt = `１，タイトル：${d.measure}による${d.target}の${d.result}

２，現状：
${clean(d.prob)}

３．問題：
あるべき姿に対し、指先で探す等のロスにより1回あたり ${d.b}${diffUnit} 要している。

４、問題の真因：
Method（手法）における、経年劣化や環境変化をカバーする物理的ガードの欠如。

５，Working Backwards：
「この改善により道具との無駄な格闘が消え、高品質な作業を維持できるようになりました。」

６，実施内容：
${clean(d.sol)}

７、効果測定：
1. ${d.b}${diffUnit} - ${d.a}${diffUnit} = ${diff.toFixed(2)}${diffUnit}/回
2. ${diff.toFixed(2)}${diffUnit} ÷ ${d.unit === 'sec' ? '3600' : '60'} = ${hoursPerTime.toFixed(4)}時間/回
3. ${hoursPerTime.toFixed(4)}時間 × 1,500円 = ${Math.round(yenPerTime)}円/回
4. ${Math.round(yenPerTime)}円 × ${d.f}回 × 365日 = ${yenPerYear.toLocaleString()}円

８，1年間削減額 (A)：${yenPerYear.toLocaleString()}円
９，効果開始 (B)：WK${d.wk}
10, 本年削減額 (C)：${Math.round(yenPerYear / 52 * (53 - d.wk)).toLocaleString()}円
11, カイゼン費用 (D)：${d.cost.toLocaleString()}円
12, 本年実削減額 (E)：${Math.round(yenPerYear / 52 * (53 - d.wk) - d.cost).toLocaleString()}円`;

            return { txt, s, audit };
        }

        function copyReport() {
            navigator.clipboard.writeText(document.getElementById('rep-out').textContent);
            alert('レポートをコピーしました。');
        }
    </script>
</body>

</html>
