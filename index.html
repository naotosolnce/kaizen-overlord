<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen Report Generator - Amazon FC Official Standard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0e12;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --accent-color: #10b981;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --input-bg: rgba(0, 0, 0, 0.2);
            --warning-color: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.1;
            animation: pulse 15s infinite alternate;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            background: #2563eb;
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            background: #7c3aed;
            bottom: -100px;
            left: -100px;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.1) translate(20px, 20px);
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            padding: 2rem 0;
            text-align: center;
        }

        .gradient-text {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 2.2rem;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            margin-bottom: 3rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        input,
        textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1.2rem;
            margin-top: 0.5rem;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 1.1rem;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: transform 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        #out-sec {
            margin-top: 3rem;
            animation: fadeIn 0.4s;
            padding-bottom: 5rem;
        }

        .report-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .report-content {
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.8;
            color: #f1f5f9;
            border-left: 4px solid #2563eb;
            background: rgba(0, 0, 0, 0.4);
            padding: 1.5rem;
            border-radius: 0 12px 12px 12px;
            font-family: inherit;
        }

        .audit-panel {
            border: 1px solid rgba(245, 158, 11, 0.4);
            background: rgba(245, 158, 11, 0.05);
            padding: 1.2rem;
            border-radius: 16px;
            margin-top: 1.5rem;
        }

        .audit-title {
            color: var(--warning-color);
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
            font-weight: 800;
        }

        .audit-list {
            list-style: none;
            font-size: 0.85rem;
            color: #fbbf24;
        }

        .score-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
        }

        .score-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 3rem;
            font-weight: 800;
            display: block;
            line-height: 1;
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader-ring {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 2rem 0 1rem;
            color: #60a5fa;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header class="container">
        <h1 class="gradient-text">Kaizen Report Generator</h1>
        <p class="tagline">Amazon FC Official Training Standard</p>
    </header>

    <main class="container">

        <section class="glass-panel">
            <h2 class="section-title" style="margin-top: 0;">基本情報の入力</h2>
            <form id="kaizen-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>対策（やったこと：〇〇）</label>
                        <input type="text" id="measure" placeholder="例：レイアウト変更" required>
                    </div>
                    <div class="form-group">
                        <label>変化対象（□□）</label>
                        <input type="text" id="target" placeholder="例：作業動線" required>
                    </div>
                    <div class="form-group">
                        <label>結果（△△）</label>
                        <input type="text" id="result" placeholder="例：短縮" required>
                    </div>
                    <div class="form-group">
                        <label>WK（効果開始週）</label>
                        <input type="number" id="wk" value="10">
                    </div>
                </div>

                <h2 class="section-title">内容の入力</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>現状（今起きている状況）</label>
                        <textarea id="prob" placeholder="例：台車が遠くにあり、取りに行くのに時間がかかる" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>対策（具体的な実施内容：5W1H）</label>
                        <textarea id="sol" placeholder="例：台車の置き場を作業机のすぐ後ろに変更した" required></textarea>
                    </div>
                </div>

                <h2 class="section-title">数値の入力（効果測定）</h2>
                <div class="metrics-grid">
                    <div class="form-group">
                        <label>改善前 (秒 or 分)</label>
                        <input type="number" id="b-val" step="0.1" value="300" required>
                    </div>
                    <div class="form-group">
                        <label>改善後 (秒 or 分)</label>
                        <input type="number" id="a-val" step="0.1" value="180" required>
                    </div>
                    <div class="form-group">
                        <label>単位</label>
                        <select id="unit-type"
                            style="width:100%; background:var(--input-bg); color:white; border:1px solid var(--border-color); padding:0.8rem; border-radius:12px;">
                            <option value="min">分</option>
                            <option value="sec">秒</option>
                        </select>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>1日の発生頻度（回/日）</label>
                        <input type="number" id="f-val" value="3" required>
                    </div>
                    <div class="form-group">
                        <label>発生費用 (円)</label>
                        <input type="number" id="cost" value="0">
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="sub-btn">
                    <span class="btn-text">報告書（公式フォーマット）を作成</span>
                    <div class="loader-ring hidden"></div>
                </button>
            </form>
        </section>

        <section id="out-sec" class="hidden">
            <div class="report-section-header">
                <h3>Draft Score <span id="l-score" class="gradient-text">--</span></h3>
                <button id="cp-btn" class="secondary-btn">コピー</button>
            </div>
            <div id="rep-out" class="report-content"></div>
            <div id="msg-sec" class="hidden">
                <div class="audit-panel">
                    <div class="audit-title">💡 公式ルールに基づく補足</div>
                    <ul id="msg-list" class="audit-list"></ul>
                </div>
            </div>
            <div class="score-card">
                <div class="score-label">Reliability Score</div>
                <div class="score-value"><span id="big-score" class="gradient-text">--</span></div>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('kaizen-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sub-btn');
            btn.disabled = true;
            btn.querySelector('.loader-ring').classList.remove('hidden');
            await new Promise(r => setTimeout(r, 600));

            const d = {
                measure: document.getElementById('measure').value,
                target: document.getElementById('target').value,
                result: document.getElementById('result').value,
                prob: document.getElementById('prob').value,
                sol: document.getElementById('sol').value,
                b: parseFloat(document.getElementById('b-val').value),
                a: parseFloat(document.getElementById('a-val').value),
                f: parseInt(document.getElementById('f-val').value),
                cost: parseFloat(document.getElementById('cost').value),
                unit: document.getElementById('unit-type').value,
                wk: parseInt(document.getElementById('wk').value),
                rate: 1500
            };

            const res = generate(d);
            document.getElementById('rep-out').textContent = res.txt;
            document.getElementById('big-score').textContent = res.s;
            document.getElementById('l-score').textContent = res.s;

            const ban = document.getElementById('integrity-banner');
            if (res.isMismatch) {
                if (!ban) {
                    const newBan = document.createElement('div');
                    newBan.id = 'integrity-banner';
                    newBan.className = 'warning-banner';
                    newBan.textContent = '⚠️ データの整合性に疑義があります：タイトルと対策内容が一致していません。';
                    document.querySelector('main').prepend(newBan);
                } else {
                    ban.classList.remove('hidden');
                }
            } else if (ban) {
                ban.classList.add('hidden');
            }

            const mSec = document.getElementById('msg-sec');
            if (res.audit.length > 0) {
                document.getElementById('msg-list').innerHTML = res.audit.map(a => `
                    <li style="margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem;">
                        <strong style="color:#f59e0b; display:block; font-size:0.9rem;">【${a.cat}】 点数：${a.p > 0 ? '+' : ''}${a.p}</strong>
                        <span style="display:block; margin-top:0.2rem;">${a.msg}</span>
                    </li>
                `).join('');
                mSec.classList.remove('hidden');
            } else {
                document.getElementById('msg-list').innerHTML = '<li>✅ 全ての論理監査項目をクリアしています。</li>';
                mSec.classList.remove('hidden');
            }

            document.getElementById('out-sec').classList.remove('hidden');
            document.getElementById('out-sec').scrollIntoView({ behavior: 'smooth' });
            btn.disabled = false;
            btn.querySelector('.loader-ring').classList.add('hidden');
        };

        function generate(d) {
            const audit = [];
            let s = 95;
            let isMismatch = false;

            // 1. カイゼン前・カイゼン後の削減時間を算出
            const diff = d.b - d.a;
            const diffUnit = d.unit === 'min' ? '分' : '秒';

            // 2. 秒・分で計測したものを時間に換算
            const hoursPerTime = d.unit === 'min' ? diff / 60 : diff / 3600;

            // 3. 削減できた時間×人件費（一律 1,500円）
            const yenPerTime = hoursPerTime * d.rate;

            // 4. 1日x回、1年間に換算
            const yenPerDay = yenPerTime * d.f;
            const yenPerYear = Math.round(yenPerDay * 365);

            // --- Audit Logic ---
            const subV = ['視認', '見える', '表示', 'カラー', 'ライト', '目印'];
            const solP = ['剥がす', 'くっつく', 'キャスター', '清掃', 'フラップ', '返し', '取り付け', '固定'];

            const hasSubV = subV.some(k => d.measure.includes(k) || d.target.includes(k));
            const hasSolP = solP.some(k => d.sol.includes(k));
            const hasSolV = subV.some(k => d.sol.includes(k));

            if (hasSubV && hasSolP && !hasSolV) {
                isMismatch = true;
                audit.push({ cat: "整合性", p: -40, msg: "タイトルは『視認性』ですが、対策が『物理的な改善』です。見やすくすることで張り付きが直る論理的説明が不足しています。" });
                s -= 40;
            } else if (hasSubV && hasSolV) {
                audit.push({ cat: "整合性", p: 5, msg: "目的と手段が『視認性』で一致しており、非常に一貫性があります。" });
                s += 5;
            }

            if (d.sol.match(/交換|導入|購入|設置/) && d.cost <= 0) {
                audit.push({ cat: "財務的妥当性", p: -15, msg: "『交換・導入』を行う場合、部品代が0円である根拠が不明確です。実費または準備工数を計上してください。" });
                s -= 15;
            }

            if (d.b >= 10 && d.prob.match(/3|4|5|五/) && !d.prob.match(/10|十/)) {
                audit.push({ cat: "データ精度", p: -10, msg: "現状説明の秒数（3〜5秒）と、入力された秒数（${d.b}秒）に開きがあります。付随動作を含めた内訳が必要です。" });
                s -= 10;
            }

            const clean = (str) => str.trim().replace(/。+$/, '');

            const txt = `１，タイトル：${d.measure}による${d.target}の${d.result}

２，現状：
${clean(d.prob)}という状況が発生している。

３．問題：
あるべき姿（スムーズな遂行）と現状とのギャップにより、1回あたり ${d.b}${diffUnit} の時間がかかっていることが問題である。

４、問題の真因：
なぜ？：現状を放置せざるを得ない物理的・手順的な障壁が存在するため。
真因：4MのMethod（方法）における、最適なワークフロー設定の不足。

５，Working Backwards（喜びの声）：
「このカイゼンにより、作業効率が上がり、ルーチン作業がとても楽になりました！」

６，対策（実施内容）：
${clean(d.sol)}を実施。

７、効果測定（計算式）：
1. 削減時間の算出：${d.b}${diffUnit} - ${d.a}${diffUnit} = ${diff.toFixed(2)}${diffUnit}/回
2. 時間換算：${diff.toFixed(2)}${diffUnit} ÷ ${d.unit === 'min' ? '60' : '3600'} = ${hoursPerTime.toFixed(4)}時間/回
3. 削減金額：${hoursPerTime.toFixed(4)}時間/回 × 1,500円 = ${Math.round(yenPerTime)}円/回
4. 年間換算：${Math.round(yenPerTime)}円/回 × ${d.f}回/日 × 365日 = ${yenPerYear.toLocaleString()}円/年

（無形効果：安全性および作業環境の5S向上に寄与）

８，1年間で削減できる金額 (A)：${yenPerYear.toLocaleString()}円
９，カイゼンの効果開始週 (B)：WK${d.wk}
10, 本年削減金額 (C)：${Math.round(yenPerYear / 52 * (53 - d.wk)).toLocaleString()}円
１１，カイゼン費用 (D)：${d.cost.toLocaleString()}円
１２，本年実削減金額 (E)：${Math.round(yenPerYear / 52 * (53 - d.wk) - d.cost).toLocaleString()}円`;

            return { txt, s, audit, isMismatch };
        }

        document.getElementById('cp-btn').onclick = () => {
            navigator.clipboard.writeText(document.getElementById('rep-out').textContent);
            alert('コピーしました。');
        };
    </script>
</body>

</html>
