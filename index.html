<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaizen Supreme - Professional Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #05060f;
            --card-glass: rgba(255, 255, 255, 0.03);
            --card-overlay: rgba(255, 255, 255, 0.05);
            --accent-glow: rgba(99, 102, 241, 0.5);
            --primary: #6366f1;
            --primary-glow: #818cf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Abstract Premium Background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 10% 10%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem 0;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Stepper UI */
        .stepper {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--card-overlay);
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: var(--primary);
            box-shadow: 0 0 10px var(--accent-glow);
            transform: scale(1.5);
        }

        /* Glass Cards */
        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }

        .glass-card.hidden {
            display: none;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input,
        textarea,
        select {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* Button Supreme */
        .btn-supreme {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 18px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-supreme:active {
            transform: scale(0.98);
        }

        .btn-supreme:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            margin-top: 1rem;
        }

        /* Output View */
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
        }

        .score-display {
            text-align: right;
        }

        .score-large {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
            color: var(--primary-glow);
        }

        .report-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 1.5rem;
            font-size: 0.9rem;
            line-height: 1.8;
            white-space: pre-wrap;
            border-left: 2px solid var(--primary);
            margin-bottom: 2rem;
        }

        .audit-item {
            display: flex;
            gap: 12px;
            padding: 1rem;
            background: rgba(245, 158, 11, 0.05);
            border-radius: 14px;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
        }

        .audit-cat {
            font-weight: 800;
            color: var(--warning);
            min-width: 60px;
        }

        /* iPhone 7 Specific Fixes */
        @media (max-width: 375px) {
            .container {
                padding: 1rem;
            }

            .glass-card {
                padding: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="bg-mesh"></div>

    <div class="container">
        <header>
            <h1>Kaizen Supreme</h1>
            <p style="font-size: 0.7rem; color: var(--text-dim); margin-top: 4px;">Elite Performance Report</p>
        </header>

        <div class="stepper" id="stepper">
            <div class="step-dot active"></div>
            <div class="step-dot"></div>
            <div class="step-dot"></div>
        </div>

        <main>
            <!-- STEP 1: Framing & Smart Template -->
            <div class="glass-card fade-in" id="step-1">
                <div
                    style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); border-radius: 16px; padding: 1.2rem; margin-bottom: 2rem;">
                    <label style="color: var(--primary-glow); font-weight: 800;">✨ Smart Draft (プロフェッショナル下書き生成)</label>
                    <textarea id="magic-input" rows="2" placeholder="（例）備品が遠い、テープが剥がしにくい、腰が痛い、などキーワードを入力"></textarea>
                    <button class="btn-supreme" id="magic-btn"
                        style="margin-top: 10px; background: linear-gradient(45deg, var(--primary), #a855f7); font-size: 0.8rem; padding: 0.8rem;"
                        onclick="runSmartDraft()">下書きを反映する</button>
                </div>

                <p style="margin-bottom: 1.5rem; font-weight: 700;">Step 1: １，タイトル（〇〇による○○）</p>
                <div class="field-group">
                    <label>対策 (手段：例：台車の導入)</label>
                    <input type="text" id="measure" placeholder="何をしたか" required>
                </div>
                <div class="field-group">
                    <label>変化対象・結果 (目的：例：移動時間の削減)</label>
                    <input type="text" id="target" placeholder="何が変わったか" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="field-group">
                        <label>９，効果開始週 (WK)</label>
                        <input type="number" id="wk" value="10">
                    </div>
                    <div class="field-group">
                        <label>展開母数 (全〇〇箇所)</label>
                        <input type="number" id="denominator" value="1">
                    </div>
                </div>
                <button class="btn-supreme" onclick="nextStep(2)">次へ進む</button>
            </div>

            <!-- STEP 2: Analysis & Deep Dive -->
            <div class="glass-card hidden fade-in" id="step-2">
                <p style="margin-bottom: 1.5rem; font-weight: 700;">Step 2: 現状・問題・なぜなぜ分析</p>
                <div class="field-group">
                    <label>２，現状（背景・目に見えている状況）</label>
                    <textarea id="prob-bg" rows="3" placeholder="（例）よく使う備品の在庫が作業スペースから離れた所にある。" required></textarea>
                </div>
                <div class="field-group">
                    <label>３．問題（何が、どう問題か）</label>
                    <textarea id="prob-main" rows="3" placeholder="（例）備品が離れた所にあり、取りに行くのに3分/回ｘ10回＝30分/日かかっている。"
                        required></textarea>
                </div>
                <div class="field-group">
                    <label>４Ｍカテゴリー</label>
                    <select id="four-m">
                        <option value="Method">Method (作業方法・手順)</option>
                        <option value="Machine">Machine (設備・治具・システム)</option>
                        <option value="Material">Material (材料・梱包材・備品)</option>
                        <option value="Man">Man (人・トレーニング・配置)</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>６，実施した対策（具体的な5W1H）</label>
                    <textarea id="sol" rows="3" placeholder="（例）各梱包デスクにホルダーを設置しシルエット影を貼付。" required></textarea>
                </div>
                <div class="field-group">
                    <label>４、真因究明 (5 Whys)</label>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <input type="text" id="why1" placeholder="なぜ？ (1回目)">
                        <input type="text" id="why2" placeholder="なぜ？ (2回目)">
                        <input type="text" id="why3" placeholder="なぜ？ (3回目)">
                        <input type="text" id="why4" placeholder="なぜ？ (4回目)">
                        <input type="text" id="why5" placeholder="なぜ？ (5回目：真因)">
                    </div>
                </div>
                <div class="field-group">
                    <label>５，Working Backwards (未来のお客様の声)</label>
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <input type="text" id="wb-customer" placeholder="お客様は誰？ (例：ワーカー、同僚、出荷担当)">
                        <textarea id="wb-voice" rows="3" placeholder="カイゼン後、どんな風に言ってもらえたら嬉しいか？ (口調を意識)"></textarea>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-supreme btn-secondary" onclick="nextStep(1)">戻る</button>
                    <button class="btn-supreme" onclick="nextStep(3)">次へ進む</button>
                </div>
            </div>

            <!-- STEP 3: Data -->
            <div class="glass-card hidden fade-in" id="step-3">
                <p style="margin-bottom: 1.5rem; font-weight: 700;">Step 3: 財務データとROI</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="field-group">
                        <label>改善前 (秒/分)</label>
                        <input type="number" id="b-val" value="10" step="0.1">
                    </div>
                    <div class="field-group">
                        <label>改善後 (秒/分)</label>
                        <input type="number" id="a-val" value="2" step="0.1">
                    </div>
                </div>
                <div class="field-group">
                    <label>時間単位</label>
                    <select id="unit-type">
                        <option value="sec">秒 (Seconds)</option>
                        <option value="min">分 (Minutes)</option>
                    </select>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="field-group">
                        <label>頻度 (回/日)</label>
                        <input type="number" id="f-val" value="500">
                    </div>
                    <div class="field-group">
                        <label>費用 (円)</label>
                        <input type="number" id="cost" value="0">
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-supreme btn-secondary" onclick="nextStep(2)">戻る</button>
                    <button class="btn-supreme" style="background: var(--success);" id="finish-btn"
                        onclick="finish()">完成させる</button>
                </div>
            </div>

            <!-- OUTPUT -->
            <div id="output-view" class="hidden fade-in">
                <div class="report-header">
                    <div>
                        <p style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;">Final Report
                        </p>
                        <h2 style="font-size: 1.2rem;">Generated Draft</h2>
                    </div>
                    <div class="score-display">
                        <p style="font-size: 0.6rem; color: var(--text-dim);">DIVE DEEP SCORE</p>
                        <div class="score-large" id="l-score">--</div>
                    </div>
                </div>

                <div id="rep-out" class="report-box"></div>

                <div id="audit-sec" style="margin-bottom: 2rem;">
                    <p
                        style="font-size: 0.7rem; font-weight: 800; color: var(--text-dim); margin-bottom: 1rem; text-transform: uppercase;">
                        Detailed Audit Insights</p>
                    <div id="audit-list"></div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <button class="btn-supreme btn-secondary" style="flex: 1;" onclick="restart()">最初から</button>
                    <button class="btn-supreme" style="flex: 2;" onclick="copyReport()">レポートをコピー</button>
                </div>
            </div>
        </main>
    </div>


    <script src="app.js"></script>
</body>

</html>
</body>

</html>
